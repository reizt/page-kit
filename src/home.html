<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Kit</title>
  <style>
    :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: #f2f4f7; background: #090d16; }
    main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 64px 0; }
    header { margin-bottom: 28px; }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: -.05em; }
    header p { margin: 0; color: #98a2b3; }
    .panel { padding: 24px; border: 1px solid #293246; border-radius: 18px; background: #121826; box-shadow: 0 18px 48px rgb(0 0 0 / 28%); }
    form { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; font-size: .875rem; font-weight: 650; }
    input, textarea, button { font: inherit; }
    input, textarea { width: 100%; border: 1px solid #34405a; border-radius: 10px; color: inherit; background: #0d1320; outline: none; }
    input { height: 46px; padding: 0 13px; }
    input:focus, textarea:focus { border-color: #8491ff; box-shadow: 0 0 0 3px rgb(132 145 255 / 18%); }
    .url-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    button { border: 0; color: inherit; cursor: pointer; }
    .submit { min-height: 46px; padding: 0 20px; border-radius: 10px; color: #fff; background: #5969e8; font-weight: 700; }
    .submit:hover { background: #6d7cf0; }
    button:disabled { cursor: wait; opacity: .65; }
    .status { min-height: 1.5em; margin: 18px 0 8px; color: #98a2b3; font-size: .875rem; }
    .status.error { color: #f97066; }
    .result-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 1rem; }
    .copy { min-height: 34px; padding: 0 12px; border: 1px solid #34405a; border-radius: 8px; color: #d0d5dd; background: #171f30; font-size: .82rem; }
    .copy:hover { background: #202a3e; }
    .segmented { display: grid; grid-template-columns: repeat(2, 1fr); width: min(260px, 100%); margin-bottom: 10px; padding: 3px; border: 1px solid #293246; border-radius: 10px; background: #0d1320; }
    .segment { min-height: 34px; padding: 0 16px; border-radius: 7px; color: #98a2b3; background: transparent; font-size: .84rem; font-weight: 650; }
    .segment:hover { color: #d0d5dd; }
    .segment[aria-selected="true"] { color: #f2f4f7; background: #293246; box-shadow: 0 1px 3px rgb(0 0 0 / 30%); }
    textarea { min-height: 360px; padding: 14px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .86rem; line-height: 1.6; }
    .preview { min-height: 360px; padding: 18px 20px; overflow-wrap: anywhere; border: 1px solid #34405a; border-radius: 10px; background: #0d1320; line-height: 1.7; }
    .preview > :first-child { margin-top: 0; }
    .preview > :last-child { margin-bottom: 0; }
    .preview h1, .preview h2, .preview h3 { margin: 1.5em 0 .6em; line-height: 1.25; }
    .preview h1 { font-size: 1.8rem; }
    .preview h2 { padding-bottom: .35em; border-bottom: 1px solid #293246; font-size: 1.4rem; }
    .preview h3 { font-size: 1.15rem; }
    .preview a { color: #9ba7ff; }
    .preview blockquote { margin-inline: 0; padding-left: 1em; border-left: 3px solid #5969e8; color: #b8c0cc; }
    .preview pre { overflow-x: auto; padding: 14px; border-radius: 8px; background: #070b12; }
    .preview code { padding: .15em .35em; border-radius: 4px; background: #1b2435; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .88em; }
    .preview pre code { padding: 0; background: transparent; }
    .preview table { display: block; width: max-content; max-width: 100%; overflow-x: auto; border-collapse: collapse; }
    .preview th, .preview td { padding: 8px 12px; border: 1px solid #34405a; text-align: left; }
    [hidden] { display: none; }
    @media (max-width: 600px) { main { padding: 36px 0; } .panel { padding: 18px; } .url-row { grid-template-columns: 1fr; } .segmented { width: 100%; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Page Kit</h1>
      <p>Webページの本文を、読みやすいMarkdownに変換します。</p>
    </header>
    <section class="panel">
      <form id="convert-form">
        <label>
          URL
          <span class="url-row">
            <input id="url" type="url" inputmode="url" required placeholder="https://example.com/article">
            <button id="submit" class="submit" type="submit">Markdownに変換</button>
          </span>
        </label>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <div id="result" hidden>
        <div class="result-header">
          <h2 id="title">変換結果</h2>
          <button id="copy" class="copy" type="button">コピー</button>
        </div>
        <div class="segmented" role="tablist" aria-label="表示形式">
          <button id="source-tab" class="segment" type="button" role="tab" aria-selected="true" aria-controls="source-panel" data-view="source">Source</button>
          <button id="preview-tab" class="segment" type="button" role="tab" aria-selected="false" aria-controls="preview-panel" data-view="preview" tabindex="-1">Preview</button>
        </div>
        <div id="source-panel" role="tabpanel" aria-labelledby="source-tab">
          <textarea id="markdown" readonly aria-label="変換されたMarkdown"></textarea>
        </div>
        <div id="preview-panel" class="preview" role="tabpanel" aria-labelledby="preview-tab" hidden></div>
      </div>
    </section>
  </main>
  <script>
    const form = document.querySelector('#convert-form');
    const url = document.querySelector('#url');
    const submit = document.querySelector('#submit');
    const status = document.querySelector('#status');
    const result = document.querySelector('#result');
    const title = document.querySelector('#title');
    const markdown = document.querySelector('#markdown');
    const preview = document.querySelector('#preview-panel');
    const copy = document.querySelector('#copy');
    const tabs = Array.from(document.querySelectorAll('[role="tab"]'));

    function selectView(view) {
      for (const tab of tabs) {
        const selected = tab.dataset.view === view;
        tab.setAttribute('aria-selected', String(selected));
        tab.tabIndex = selected ? 0 : -1;
        document.querySelector(`#${tab.getAttribute('aria-controls')}`).hidden = !selected;
      }
    }

    for (const tab of tabs) {
      tab.addEventListener('click', () => selectView(tab.dataset.view));
      tab.addEventListener('keydown', (event) => {
        if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
        event.preventDefault();
        const next = tabs[(tabs.indexOf(tab) + (event.key === 'ArrowRight' ? 1 : -1) + tabs.length) % tabs.length];
        selectView(next.dataset.view);
        next.focus();
      });
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submit.disabled = true;
      submit.textContent = '変換中…';
      status.className = 'status';
      status.textContent = 'ページを取得しています。';
      result.hidden = true;

      try {
        const response = await fetch('/fetch', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ url: url.value, render: 'auto' }),
        });
        const body = await response.json();
        if (!response.ok || !body.success) throw new Error(body.error?.message || '変換に失敗しました');

        title.textContent = body.data.title || '変換結果';
        markdown.value = body.data.markdown;
        preview.innerHTML = body.data.previewHtml;
        status.textContent = body.data.metadata.cached ? 'キャッシュから取得しました。' : '変換しました。';
        selectView('source');
        result.hidden = false;
      } catch (error) {
        status.className = 'status error';
        status.textContent = error instanceof Error ? error.message : '変換に失敗しました';
      } finally {
        submit.disabled = false;
        submit.textContent = 'Markdownに変換';
      }
    });

    copy.addEventListener('click', async () => {
      await navigator.clipboard.writeText(markdown.value);
      copy.textContent = 'コピーしました';
      setTimeout(() => { copy.textContent = 'コピー'; }, 1500);
    });
  </script>
</body>
</html>
